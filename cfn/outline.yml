            Ref: EnvName
        - Key: project
          Value: outline
      VersioningConfiguration:
        Status: Enabled
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Metadata:
      aws:cdk:path: Outline/Compute/AttachmentsBucket/Resource
  ComputeCluster4F8E5F81:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName:
        Fn::Join:
          - ""
          - - outline-
            - Ref: EnvName
      Tags:
        - Key: environment
          Value:
            Ref: EnvName
        - Key: project
          Value: outline
    Metadata:
      aws:cdk:path: Outline/Compute/Cluster/Resource
  ComputeCluster64C33C01:
    Type: AWS::ECS::ClusterCapacityProviderAssociations
    Properties:
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      Cluster:
        Ref: ComputeCluster4F8E5F81
      DefaultCapacityProviderStrategy: []
    Metadata:
      aws:cdk:path: Outline/Compute/Cluster/Cluster
  ComputeLogGroup1A40385B:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Join:
          - ""
          - - /outline/
            - Ref: EnvName
      RetentionInDays: 14
      Tags:
        - Key: environment
          Value:
            Ref: EnvName
        - Key: project
          Value: outline
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
    Metadata:
      aws:cdk:path: Outline/Compute/LogGroup/Resource
  ComputeTaskDefTaskRole10B1918B:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
        Version: "2012-10-17"
      Tags:
        - Key: environment
          Value:
            Ref: EnvName
        - Key: project
          Value: outline
    Metadata:
      aws:cdk:path: Outline/Compute/TaskDef/TaskRole/Resource
  ComputeTaskDefTaskRoleDefaultPolicy70556C7B:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - s3:GetObject*
              - s3:GetBucket*
              - s3:List*
              - s3:DeleteObject*
              - s3:PutObject
              - s3:PutObjectLegalHold
              - s3:PutObjectRetention
              - s3:PutObjectTagging
              - s3:PutObjectVersionTagging
              - s3:Abort*
            Effect: Allow
            Resource:
              - Fn::GetAtt:
                  - ComputeAttachmentsBucketCAE07D70
                  - Arn
              - Fn::Join:
                  - ""
                  - - Fn::GetAtt:
                        - ComputeAttachmentsBucketCAE07D70
                        - Arn
                    - /*
        Version: "2012-10-17"
      PolicyName: ComputeTaskDefTaskRoleDefaultPolicy70556C7B
      Roles:
        - Ref: ComputeTaskDefTaskRole10B1918B
    Metadata:
      aws:cdk:path: Outline/Compute/TaskDef/TaskRole/DefaultPolicy/Resource
  ComputeTaskDefBA99999B:
    Type: AWS::ECS::TaskDefinition
    Properties:
      ContainerDefinitions:
        - Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: URL
              Value:
                Fn::Join:
                  - ""
                  - - https://
                    - Ref: Domain
            - Name: FILE_STORAGE
              Value: s3
            - Name: AWS_S3_UPLOAD_BUCKET_NAME
              Value:
                Ref: ComputeAttachmentsBucketCAE07D70
            - Name: AWS_S3_UPLOAD_BUCKET_URL
              Value:
                Fn::Join:
                  - ""
